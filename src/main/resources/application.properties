spring.application.name=car_rental
server.port=${SERVER_PORT:8081}

# ── DataSource ─────────────────────────────────────────────────────────────────
# Values injected from environment variables at runtime.
# Fallback defaults allow local development without setting env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vehicle_service?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}
spring.data.jdbc.dialect=mysql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ── Eureka ─────────────────────────────────────────────────────────────────────
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}