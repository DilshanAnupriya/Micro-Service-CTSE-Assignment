spring.application.name=car-rental

# Production: disable verbose SQL logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=update

# Production actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Eureka ──────────────────────────────────────────────────────────────────
eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ── Kafka — Topics only ──────────────────────────────────────────────────────
app.kafka.topic.vehicle-created=vehicle-created
app.kafka.topic.vehicle-updated=vehicle-updated
app.kafka.topic.vehicle-deleted=vehicle-deleted