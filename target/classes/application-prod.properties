spring.application.name=car_rental

# Production: disable verbose SQL logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production: do not auto-create/update schema — use migration tools (Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate

# Production actuator: expose only health & info (not all endpoints)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
