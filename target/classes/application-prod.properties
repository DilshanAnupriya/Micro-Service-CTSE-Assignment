spring.application.name=car-rental

# Production: disable verbose SQL logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production: do not auto-create/update schema — use migration tools (Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate

# Production actuator: expose only health & info (not all endpoints)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Eureka (Production — ECS) ───────────────────────────────────────────────────────
# EUREKA_CLIENT_SERVICEURL_DEFAULTZONE is injected as an ECS task env var
# pointing to the Eureka Server ECS service (e.g. http://eureka-server:8761/eureka/)
eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
eureka.instance.prefer-ip-address=true
# Shorter lease so ECS task replacements de-register quickly
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ── Kafka (Production — Amazon MSK or self-hosted) ─────────────────────────────
# KAFKA_BOOTSTRAP_SERVERS is injected as an ECS task env var
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Production reliability settings
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
